<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="particleGrad1" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#8B7BA8;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#8B7BA8;stop-opacity:0"/>
    </radialGradient>
    
    <radialGradient id="particleGrad2" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#6B8CAE;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#6B8CAE;stop-opacity:0"/>
    </radialGradient>
    
    <radialGradient id="particleGrad3" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#9BA5B0;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#9BA5B0;stop-opacity:0"/>
    </radialGradient>
    
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8"/>
    </filter>
    
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>
  </defs>
  
  <!-- Capa de fons: partícules grans i difuses -->
  <g opacity="0.4" filter="url(#blur2)">
    <circle cx="300" cy="200" r="8" fill="url(#particleGrad1)">
      <animate attributeName="r" values="8;10;8" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.6;0.4" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="280" cy="180" r="6" fill="url(#particleGrad2)">
      <animate attributeName="r" values="6;8;6" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="180;175;180" dur="5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="320" cy="180" r="6" fill="url(#particleGrad3)">
      <animate attributeName="r" values="6;7;6" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="180;185;180" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="260" cy="200" r="7" fill="url(#particleGrad1)">
      <animate attributeName="r" values="7;9;7" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="260;255;260" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="340" cy="200" r="7" fill="url(#particleGrad2)">
      <animate attributeName="r" values="7;8;7" dur="4.8s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="340;345;340" dur="4.8s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="300" cy="160" r="5" fill="url(#particleGrad3)">
      <animate attributeName="r" values="5;7;5" dur="6s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="300" cy="240" r="5" fill="url(#particleGrad1)">
      <animate attributeName="r" values="5;6;5" dur="5.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Capa mitja: densitat central -->
  <g opacity="0.6" filter="url(#blur1)">
    <circle cx="290" cy="195" r="3" fill="#8B7BA8">
      <animate attributeName="cy" values="195;192;195" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.7;0.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="310" cy="195" r="3" fill="#6B8CAE">
      <animate attributeName="cy" values="195;198;195" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="295" cy="185" r="2.5" fill="#9BA5B0">
      <animate attributeName="cx" values="295;293;295" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="305" cy="185" r="2.5" fill="#8B7BA8">
      <animate attributeName="cx" values="305;307;305" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="285" cy="200" r="3" fill="#6B8CAE">
      <animate attributeName="r" values="3;4;3" dur="5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="315" cy="200" r="3" fill="#9BA5B0">
      <animate attributeName="r" values="3;3.5;3" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="300" cy="210" r="2.5" fill="#8B7BA8">
      <animate attributeName="cy" values="210;213;210" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="300" cy="175" r="2.5" fill="#6B8CAE">
      <animate attributeName="cy" values="175;172;175" dur="4.8s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="275" cy="190" r="2" fill="#9BA5B0">
      <animate attributeName="cx" values="275;273;275" dur="6s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="325" cy="190" r="2" fill="#8B7BA8">
      <animate attributeName="cx" values="325;327;325" dur="5.3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Capa frontal: partícules nítides amb més moviment -->
  <g opacity="0.8">
    <circle cx="300" cy="200" r="2" fill="#8B7BA8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="295" cy="200" r="1.5" fill="#6B8CAE">
      <animate attributeName="cy" values="200;198;200" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.9;0.7" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="305" cy="200" r="1.5" fill="#9BA5B0">
      <animate attributeName="cy" values="200;202;200" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.9;0.7" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="300" cy="195" r="1.5" fill="#8B7BA8">
      <animate attributeName="cx" values="300;298;300" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="300" cy="205" r="1.5" fill="#6B8CAE">
      <animate attributeName="cx" values="300;302;300" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="292" cy="197" r="1.2" fill="#9BA5B0">
      <animate attributeName="r" values="1.2;1.5;1.2" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="308" cy="197" r="1.2" fill="#8B7BA8">
      <animate attributeName="r" values="1.2;1.4;1.2" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="292" cy="203" r="1.2" fill="#6B8CAE">
      <animate attributeName="cy" values="203;205;203" dur="5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="308" cy="203" r="1.2" fill="#9BA5B0">
      <animate attributeName="cy" values="203;201;203" dur="4.8s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="288" cy="200" r="1" fill="#8B7BA8">
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="312" cy="200" r="1" fill="#6B8CAE">
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="5.2s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="300" cy="188" r="1" fill="#9BA5B0">
      <animate attributeName="cy" values="188;186;188" dur="6s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="300" cy="212" r="1" fill="#8B7BA8">
      <animate attributeName="cy" values="212;214;212" dur="5.8s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Perifèria -->
    <circle cx="270" cy="195" r="1.5" fill="#6B8CAE" opacity="0.5">
      <animate attributeName="cx" values="270;268;270" dur="6s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="330" cy="195" r="1.5" fill="#9BA5B0" opacity="0.5">
      <animate attributeName="cx" values="330;332;330" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="285" cy="175" r="1.2" fill="#8B7BA8" opacity="0.4">
      <animate attributeName="cy" values="175;173;175" dur="7s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="315" cy="175" r="1.2" fill="#6B8CAE" opacity="0.4">
      <animate attributeName="cy" values="175;177;175" dur="6.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="285" cy="225" r="1.2" fill="#9BA5B0" opacity="0.4">
      <animate attributeName="cy" values="225;227;225" dur="6.8s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="315" cy="225" r="1.2" fill="#8B7BA8" opacity="0.4">
      <animate attributeName="cy" values="225;223;225" dur="7.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Partícules disperses extrems -->
  <g opacity="0.3">
    <circle cx="250" cy="200" r="1" fill="#8B7BA8">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="8s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="350" cy="200" r="1" fill="#6B8CAE">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="7.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="280" cy="160" r="0.8" fill="#9BA5B0">
      <animate attributeName="cy" values="160;158;160" dur="9s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="320" cy="160" r="0.8" fill="#8B7BA8">
      <animate attributeName="cy" values="160;162;160" dur="8.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="280" cy="240" r="0.8" fill="#6B8CAE">
      <animate attributeName="cy" values="240;242;240" dur="9.2s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="320" cy="240" r="0.8" fill="#9BA5B0">
      <animate attributeName="cy" values="240;238;240" dur="8.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>