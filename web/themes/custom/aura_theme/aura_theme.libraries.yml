global-styling:
  version: 1.x
  css:
    theme:
      css/aura-style.css: {}
      css/aura-blocks.css: {}
  js:
    js/smooth-scroll.js: {}
    js/hide-empty-highlighted.js: {}

article-stats:
  version: 1.x
  js:
    js/article-stats.js: {}
    js/comment-form-toggle.js: {}
  dependencies:
    - core/drupal
    - core/once

space-grotesk-fonts:
  css:
    theme:
      https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap:
        type: external
        minified: true
        preprocess: false
        browsers:
          IE: false
          '!IE': true

bitter-fonts:
  css:
    theme:
      https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&display=swap:
        type: external
        minified: true
        preprocess: false
        browsers:
          IE: false
          '!IE': true